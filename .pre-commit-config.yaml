repos:
  # ── Ruff: lint + format ─────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── Mypy strict type-check ──────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy --strict src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # ── Standard file hygiene ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=5120]
      - id: debug-statements
