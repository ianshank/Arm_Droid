[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "armdroid"
version = "0.1.0"
description = "Robot arm manipulation platform — SO-ARM100, MuJoCo, SAC+HER, PDDL planning"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.4",
    "pydantic>=2.7",
    "pydantic-settings>=2.7",
    "structlog>=23.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "gymnasium>=0.29",
    "mujoco>=3.2",
    "stable-baselines3>=2.3",
    "pyperplan>=2.0",
    "ultralytics>=8.0",
    "scipy>=1.10",
]

[project.optional-dependencies]
hardware = [
    "pyserial>=3.5",
]
realsense = [
    "pyrealsense2>=2.55",
]
anthropic = [
    "anthropic>=0.40",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "pytest-timeout>=2.3",
    "pytest-xdist>=3.0",
    "hypothesis>=6.80",
    "ruff==0.8.0",
    "mypy>=1.5",
    "types-PyYAML>=6.0",
]

[project.scripts]
armdroid = "armdroid.main:cli_entry"

[tool.hatch.build.targets.wheel]
packages = ["src/armdroid"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "A", "C4", "SIM", "RUF", "PT",
    "S", "ANN", "D", "T20",
]
ignore = ["D100", "D104", "D107", "D203", "D213", "S101", "ANN401", "TCH", "TC"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["D", "ANN", "S101", "S108", "S603", "S607", "E402"]
"src/armdroid/planning/llm_replanners/**/*.py" = ["D102"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "armdroid.config.schema",
    "armdroid.control.sac_agent",
    "armdroid.perception.object_detector",
    "armdroid.perception.depth_processor",
]
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = ["armdroid.config.schema"]
disable_error_code = ["arg-type"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow",
    "hardware: marks tests requiring real hardware",
    "gpu: marks tests requiring CUDA GPU",
]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src/armdroid"]
omit = [
    "*/tests/*",
    "*/main.py",
    "*/hardware/so_arm100_driver.py",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "pass",
    "\\.\\.\\.",
]
