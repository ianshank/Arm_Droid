; PlatformIO project for the armdroid arm controller firmware.
;
; Targets any ESP32 dev board with a USB-UART bridge. The default env
; below is for the ESP32 DevKitC. Override `upload_port` on the command
; line if your board enumerates differently:
;
;     pio run -e esp32dev -t upload --upload-port /dev/ttyUSB0
;
; The native env runs the host-side C++ unit tests for the joint
; interpolator without needing hardware.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    madhephaestus/ESP32Servo @ ^3.0.5
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11
extra_scripts =
    pre:gen_config_pre.py

; Native env for host-side unit tests of the firmware logic. Lets us
; run the joint-validation and JSON-encoding code on the dev machine
; under standard pytest-style assertions without a flash cycle.
;
; src_filter excludes firmware.cpp (Arduino-framework entry point that
; includes <Arduino.h>) so the native toolchain only sees the
; header-only interpolator and the UNIT_TEST-guarded config header.
[env:native]
platform = native
test_build_src = yes
test_framework = unity
src_filter =
    +<*>
    -<firmware.cpp>
build_flags =
    -std=gnu++17
    -DUNIT_TEST
