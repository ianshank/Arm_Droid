name: firmware-ci

on:
  push:
    branches: [main]
    paths:
      - "firmware/arm_esp32/**"
      - "scripts/gen_firmware_config.py"
      - "src/armdroid/config/schema.py"
      - ".github/workflows/firmware-ci.yml"
  pull_request:
    paths:
      - "firmware/arm_esp32/**"
      - "scripts/gen_firmware_config.py"
      - "src/armdroid/config/schema.py"
      - ".github/workflows/firmware-ci.yml"
  workflow_dispatch: {}

jobs:
  codegen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install armdroid (host config + codegen deps only)
        run: |
          python -m pip install --upgrade pip
          # Install just the schema / loader deps so codegen is fast.
          # We deliberately skip torch / mujoco / SB3 — they're not needed
          # to render the firmware header. ``numpy`` is required because
          # ``armdroid/__init__.py`` re-exports protocol types whose
          # annotations reference ``numpy.typing.NDArray`` (lazy at runtime
          # but still resolved when modules import the public API).
          pip install "pydantic>=2.7" "pydantic-settings>=2.7" "structlog>=23.0" "pyyaml>=6.0" "numpy>=1.24"
      - name: Verify config_generated.h is in sync with ArmSettings
        run: python scripts/gen_firmware_config.py --check

  pio-native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-native-${{ hashFiles('firmware/arm_esp32/platformio.ini') }}
      - name: Run native firmware unit tests (interpolator + serial framing)
        working-directory: firmware/arm_esp32
        run: pio test -e native -v

  pio-build:
    runs-on: ubuntu-latest
    needs: codegen-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install host deps for codegen pre-build hook
        run: |
          python -m pip install --upgrade pip
          pip install platformio "pydantic>=2.7" "pydantic-settings>=2.7" "structlog>=23.0" "pyyaml>=6.0" "numpy>=1.24"
      - name: Cache PlatformIO ESP32 toolchain + packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-esp32dev-${{ hashFiles('firmware/arm_esp32/platformio.ini') }}
      - name: Build esp32dev firmware
        working-directory: firmware/arm_esp32
        run: pio run -e esp32dev
