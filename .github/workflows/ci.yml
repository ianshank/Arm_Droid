name: CI

on:
  push:
    branches: ["main", "refactor/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: python -m ruff check src/ tests/
      - name: Ruff format check
        run: python -m ruff format src/ tests/ --check

  typecheck:
    name: Mypy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: Mypy
        run: python -m mypy --strict src/

  test:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: Run tests (exclude slow/hardware/gpu)
        # Single-line invocation: backslash line continuations are not
        # portable to PowerShell on windows-latest runners.
        run: python -m pytest -m "not slow and not hardware and not gpu" --cov=armdroid --cov-fail-under=85 -q
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage

  test-full:
    name: Full suite (Ubuntu / Python 3.11)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev extras
        run: pip install -e ".[dev]"
      - name: Run full test suite (exclude hardware-only tests)
        run: python -m pytest -m "not hardware" --cov=armdroid --cov-fail-under=85 -q

